<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>孩子的AI学习助手</title>
    <style>
        body { font-family: Arial; max-width: 800px; margin: 50px auto; padding: 20px; }
        textarea { width: 100%; height: 100px; margin: 10px 0; }
        button { background: green; color: white; padding: 10px 20px; border: none; cursor: pointer; }
        #answer { background: #f0f0f0; padding: 15px; border-radius: 5px; margin-top: 20px; white-space: pre-wrap; }
    </style>
</head>
<body>
    <h1>📚 孩子的AI学习助手</h1>
    <p>输入问题，AI会帮你解答（数学、语文、英语都可以）</p>
    
    <textarea id="question" placeholder="例如：怎么解方程 2x + 5 = 15？"></textarea>
    <button onclick="askAI()">提问 AI</button>
    <div id="answer">🤖 答案会显示在这里...</div>

    <script>
        async function askAI() {
            const question = document.getElementById('question').value;
            if (!question) return;
            document.getElementById('answer').innerText = '🤔 思考中...';
            
            try {
                const response = await fetch('https://free.chatapi.xyz/v1/chat/completions', {
    method: 'POST',
    headers: { 
        'Content-Type': 'application/json',
        'Authorization': 'Bearer free'
    },
    body: JSON.stringify({
        model: 'gpt-3.5-turbo',
        messages: [{ role: 'user', content: question }],
        max_tokens: 1000
    })
});
    </script>
</body>
</html>
